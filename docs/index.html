<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Insights 2026</title>
<script>
  (function () {
    var mode = null;
    try { mode = localStorage.getItem("fi-theme"); } catch (e) {}
    if (mode !== "light" && mode !== "dark") mode = "light";
    location.replace(mode === "dark" ? "dark.html" : "light.html");
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=light.html" />
</noscript>
</head>
<body></body>
</html>
