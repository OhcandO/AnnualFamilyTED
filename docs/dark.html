<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Insights 2026 — Ideas Worth a Sunday</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@500;600;700&display=swap" rel="stylesheet" />
<script>
  try { localStorage.setItem("fi-theme", "dark"); } catch (e) {}
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="module">
  import * as Lucide from "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1";
  window.Lucide = Lucide;
  window.__lucideReady = true;
  window.dispatchEvent(new Event("lucide-ready"));
</script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: "#0A0A0B",
          panel: "#141416",
          panel2: "#1C1C20",
          edge: "#2A2A30",
          red: "#E62B1E",
          redDeep: "#B81F15",
          chalk: "#F5F5F4",
          muted: "#A1A1A6",
          dim: "#6B6B70",
        },
        fontFamily: {
          display: ['"Anton"', "sans-serif"],
          sans: ['"Archivo"', "system-ui", "sans-serif"],
          narrow: ['"Archivo Narrow"', "sans-serif"],
        },
      },
    },
  };
</script>
<style>
  html { scroll-behavior: smooth; }
  body {
    background: #0A0A0B;
    color: #F5F5F4;
    font-family: "Archivo", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .display { font-family: "Anton", sans-serif; letter-spacing: 0.005em; line-height: 0.9; text-transform: uppercase; }
  .eyebrow {
    font-family: "Archivo", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 11px;
    font-weight: 600;
  }
  .tednum { font-family: "Anton", sans-serif; }
  .ted-mark {
    background: #E62B1E;
    color: #0A0A0B;
    font-family: "Anton", sans-serif;
    letter-spacing: 0.02em;
  }
  .stage-bg {
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(230,43,30,0.22) 0%, rgba(230,43,30,0) 55%),
      radial-gradient(90% 70% at 50% 120%, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 60%),
      #0A0A0B;
  }
  .scrim-bottom { background: linear-gradient(to top, #0A0A0B 6%, rgba(10,10,11,0.6) 40%, rgba(10,10,11,0) 100%); }
  .grain {
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .hairline { border-color: rgba(255,255,255,0.10); }
  .poster {
    background:
      radial-gradient(80% 60% at 50% 0%, rgba(230,43,30,0.18), rgba(230,43,30,0) 60%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 11px),
      linear-gradient(180deg, #1C1C20 0%, #121214 100%);
  }
  .poster-secret {
    background:
      radial-gradient(70% 60% at 50% 30%, rgba(230,43,30,0.30), rgba(230,43,30,0) 65%),
      linear-gradient(180deg, #16080a 0%, #0e0e10 100%);
  }
  .map-dark {
    background:
      linear-gradient(180deg, rgba(230,43,30,0.06), rgba(255,255,255,0.02)),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 56px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 56px),
      #121214;
  }
  @keyframes softDown {
    0%, 100% { transform: translateY(0); opacity: .5; }
    50% { transform: translateY(7px); opacity: 1; }
  }
  .scroll-cue { animation: softDown 2.2s ease-in-out infinite; }
  .nf-card { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease; }
  .nf-card:hover { transform: translateY(-8px) scale(1.015); box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(230,43,30,0.4); }
  .row-scroll { scrollbar-width: thin; scrollbar-color: #2A2A30 transparent; }
  .row-scroll::-webkit-scrollbar { height: 6px; }
  .row-scroll::-webkit-scrollbar-thumb { background: #2A2A30; border-radius: 99px; }
  .btn-red { background: #E62B1E; color: #fff; transition: background .2s ease, transform .2s ease; }
  .btn-red:hover { background: #B81F15; }
  .btn-line { border: 1px solid rgba(255,255,255,0.25); color: #F5F5F4; transition: background .2s ease, border-color .2s ease; }
  .btn-line:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.5); }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  ::selection { background: #E62B1E; color: #fff; }

  /* theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(10, 10, 11, 0.75);
    backdrop-filter: blur(8px);
    border: 1px solid #E62B1E;
    color: #F5F5F4;
    font-family: "Archivo", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s ease, color .2s ease;
  }
  .theme-toggle:hover { background: #E62B1E; color: #fff; }
  .theme-toggle .dot { width: 8px; height: 8px; border-radius: 999px; background: #E62B1E; }
  .theme-toggle:hover .dot { background: #fff; }
  @media (min-width: 768px) {
    .theme-toggle { top: 24px; right: 24px; }
  }
</style>
</head>
<body>
<button
  class="theme-toggle"
  type="button"
  aria-label="Switch to magazine light edition"
  onclick="try{localStorage.setItem('fi-theme','light');}catch(e){};location.href='light.html';"
>
  <span class="dot"></span>
  <span>Light · Magazine</span>
</button>

<div id="root"></div>

<script type="text/babel" data-presets="env,react" src="ted-data.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-hero.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-invitation.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-speakers.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-schedule.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-rsvp.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ted-app.jsx"></script>
</body>
</html>
