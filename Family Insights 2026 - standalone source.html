<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Insights 2026 — 우리의 세계를 연결하다</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="icons.js"></script>
<style type="text/tailwindcss">
  @theme {
    --color-cream: #F6F1E7;
    --color-paper: #FBF8F1;
    --color-ink: #1B2A23;
    --color-forest: #2A4636;
    --color-forestDeep: #1F362A;
    --color-moss: #5B6F5C;
    --color-stone: #8A8475;
    --color-line: #E4DCC8;
    --font-serif: "Cormorant Garamond", serif;
    --font-sans: "Manrope", system-ui, sans-serif;
  }
  /* v4 base reset: borders default to currentColor — pin to design line color */
  *, ::before, ::after { border-color: var(--color-line); }
</style>
<style>
  html { scroll-behavior: smooth; }
  body {
    background: #FBF8F1;
    color: #1B2A23;
    font-family: "Manrope", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .font-serif { font-family: "Cormorant Garamond", serif; }
  .display { font-family: "Cormorant Garamond", serif; font-weight: 400; letter-spacing: -0.01em; line-height: 1.02; }
  .eyebrow {
    font-family: "Manrope", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    font-size: 11px;
    font-weight: 500;
  }
  .rule { height: 1px; background: #E4DCC8; }
  .grain {
    background-image: radial-gradient(rgba(31,54,42,0.045) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  .hairline { border-color: #E4DCC8; }
  .num-tab {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    color: #5B6F5C;
  }
  @keyframes softDown {
    0%, 100% { transform: translateY(0); opacity: .6; }
    50% { transform: translateY(6px); opacity: 1; }
  }
  .scroll-cue { animation: softDown 2.4s ease-in-out infinite; }
  .speaker-portrait {
    background:
      repeating-linear-gradient(135deg, rgba(42,70,54,0.08) 0 1px, transparent 1px 9px),
      linear-gradient(180deg, #EFE7D2 0%, #E4DCC8 100%);
  }
  .map-placeholder {
    background:
      linear-gradient(180deg, rgba(42,70,54,0.04), rgba(42,70,54,0.02)),
      repeating-linear-gradient(90deg, rgba(42,70,54,0.06) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(0deg, rgba(42,70,54,0.06) 0 1px, transparent 1px 60px),
      #F1EADA;
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .btn-primary {
    background: #2A4636;
    color: #F6F1E7;
    transition: background .2s ease, transform .2s ease;
  }
  .btn-primary:hover { background: #1F362A; }
  .btn-ghost {
    border: 1px solid #2A4636;
    color: #2A4636;
    transition: background .2s ease, color .2s ease;
  }
  .btn-ghost:hover { background: #2A4636; color: #F6F1E7; }
  ::selection { background: #2A4636; color: #F6F1E7; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#FBF8F1">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#FBF8F1"/>
    <g transform="translate(600 400)" fill="none" stroke="#2A4636" stroke-width="3">
      <circle r="180"/>
      <circle r="120"/>
      <circle r="60"/>
    </g>
    <text x="600" y="640" text-anchor="middle"
          font-family="Cormorant Garamond, Georgia, serif"
          font-size="56" font-style="italic" fill="#2A4636">
      Family Insights 2026
    </text>
  </svg>
</template>

<script type="text/babel" data-presets="env,react" src="hero.jsx"></script>
<script type="text/babel" data-presets="env,react" src="invitation.jsx"></script>
<script type="text/babel" data-presets="env,react" src="speakers.jsx"></script>
<script type="text/babel" data-presets="env,react" src="schedule.jsx"></script>
<script type="text/babel" data-presets="env,react" src="rsvp.jsx"></script>
<script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
</html>
